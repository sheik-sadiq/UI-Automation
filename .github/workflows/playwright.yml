name: Playwright Tests + Auto-Heal

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'       # nightly at 02:00 UTC
  workflow_dispatch:           # manual trigger from Actions UI

jobs:
  # ── Job 1: Run the full test suite ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      exit_code: ${{ steps.run_tests.outputs.exit_code }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - id: run_tests
        name: Run tests
        run: |
          set +e
          pytest tests/ -v --tb=short \
            --json-report --json-report-file=report.json
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.json
          if-no-files-found: warn

  # ── Job 2: AI self-healer (only fires when tests fail) ──────────────────────
  auto_heal:
    needs: test
    if: needs.test.outputs.exit_code != '0'
    runs-on: self-hosted       # needs Ollama on localhost:11434
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: test-report

      - name: Configure git identity
        run: |
          git config user.name  "auto-heal-bot"
          git config user.email "auto-heal-bot@users.noreply.github.com"

      - name: Run AI Healer
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m scripts.heal_runner --report report.json
